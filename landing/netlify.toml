# Netlify Configuration — Flow by Kaivoo Landing Page
# Static Astro site — no SPA routing needed

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Temporary preview route for post-launch page — remove on April 16, 2026
[[redirects]]
  from = "/preview"
  to = "/index.html"
  status = 200

# Temporary pre-launch redirect — remove on April 16, 2026
[[redirects]]
  from = "/"
  to = "/launch"
  status = 302
  force = true
