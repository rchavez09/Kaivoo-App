# Netlify Configuration — Flow by Kaivoo Landing Page
# Static Astro site — no SPA routing needed

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Temporary pre-launch redirect — remove on April 14, 2026
[[redirects]]
  from = "/"
  to = "/launch"
  status = 302
  force = true
