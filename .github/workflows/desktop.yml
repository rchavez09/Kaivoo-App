name: Desktop Build

on:
  push:
    branches: [main, 'sprint/*']
  pull_request:
    branches: [main]

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (arm64 + x86_64)
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Windows
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: daily-flow/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: daily-flow/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: daily-flow
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # ── Code signing (disabled until valid certificates are configured) ──
          # To enable macOS signing: set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          # APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID secrets
          # To enable Windows signing: set WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD secrets
        with:
          projectPath: daily-flow
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kaivoo-${{ matrix.platform }}
          path: |
            daily-flow/src-tauri/target/**/release/bundle/**/*.dmg
            daily-flow/src-tauri/target/**/release/bundle/**/*.app
            daily-flow/src-tauri/target/**/release/bundle/**/*.AppImage
            daily-flow/src-tauri/target/**/release/bundle/**/*.deb
            daily-flow/src-tauri/target/**/release/bundle/**/*.msi
            daily-flow/src-tauri/target/**/release/bundle/**/*.exe
            daily-flow/src-tauri/target/**/release/bundle/**/*.nsis
          if-no-files-found: warn
          retention-days: 30
